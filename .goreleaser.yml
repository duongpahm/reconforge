version: 2

before:
  hooks:
    - go mod tidy
    - mkdir -p dist/man
    - go run ./cmd/reconforge gen-manpages --out dist/man

builds:
  - id: reconforge
    main: ./cmd/reconforge
    binary: reconforge
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X github.com/duongpahm/ReconForge/internal/config.Version={{ .Version }}
      - -X github.com/duongpahm/ReconForge/internal/config.BuildTime={{ .Date }}

archives:
  - id: reconforge
    formats: [tar.gz]
    name_template: "reconforge-{{ .Os }}-{{ .Arch }}"
    files:
      - LICENSE
      - README.md
      - CHANGELOG.md
      - CONTRIBUTING.md
      - ARCHITECTURE.md
      - dist/man/*.1

checksum:
  name_template: checksums.txt
  algorithm: sha256

# GPG signing disabled for v0.1.0-rc1 (no key configured yet).
# Re-enable for v0.1.0 stable — see docs/RELEASE_RUNBOOK.md § 1.
# signs:
#   - artifacts: checksum
#     signature: "${artifact}.sig"
#     args:
#       - --batch
#       - --yes
#       - --detach-sign
#       - --output
#       - ${signature}
#       - ${artifact}

snapshot:
  version_template: "{{ incpatch .Version }}-next"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"

release:
  github:
    owner: duongpahm
    name: ReconForge
  draft: false
  prerelease: auto
